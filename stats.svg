<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="Consolas, 'Courier New', monospace" width="830px" height="350px" font-size="15px">
<style>
  .title    { fill: #8B5E3C; font-weight: bold; font-size: 20px; }
  .subtitle { fill: #8B5E3C; font-weight: bold; font-size: 17px; }
  .typing   { fill: #7A6652; font-size: 14px; }
  .tagline  { fill: #A67C52; font-size: 12px; }
  .key      { fill: #A67C52; }
  .value    { fill: #5C4433; font-weight: bold; }
  .cc       { fill: #C9B29B; }
  .addColor { fill: #6B8E5A; }
  .delColor { fill: #C1666B; }
  .divider  { stroke: #E8D9C5; stroke-width: 1; }
  text, tspan { white-space: pre; }

  .t1 { opacity: 0; animation: fade 9s infinite 0s; }
  .t2 { opacity: 0; animation: fade 9s infinite 3s; }
  .t3 { opacity: 0; animation: fade 9s infinite 6s; }

  @keyframes fade {
    0%   { opacity: 0; }
    5%   { opacity: 1; }
    28%  { opacity: 1; }
    33%  { opacity: 0; }
    100% { opacity: 0; }
  }
</style>

<rect width="830px" height="350px" fill="#FFF8F0" rx="12" stroke="#E8D9C5" stroke-width="1"/>

<!-- Header -->
<text x="415" y="40" class="title" text-anchor="middle">Hi, I'm Rishabh 🍂</text>

<!-- Typing animation -->
<text x="415" y="65" class="typing t1" text-anchor="middle">CS @ Georgia Tech</text>
<text x="415" y="65" class="typing t2" text-anchor="middle">Builder of cozy corners of code</text>
<text x="415" y="65" class="typing t3" text-anchor="middle">Full-stack dev &amp; startup tinkerer</text>

<!-- Tagline -->
<text x="415" y="88" class="tagline" text-anchor="middle">Sipping tea 🍵 and building startups and dreams.</text>

<!-- Social badges -->
<a xlink:href="https://www.linkedin.com/in/rishkano" href="https://www.linkedin.com/in/rishkano">
  <rect x="296" y="108" width="120" height="26" rx="4" fill="#B08968"/>
  <text x="356" y="126" fill="#FFF8F0" font-size="11px" font-weight="bold" letter-spacing="1" text-anchor="middle">🔗 LINKEDIN</text>
</a>
<a xlink:href="https://rishkano.com" href="https://rishkano.com">
  <rect x="424" y="108" width="110" height="26" rx="4" fill="#8B5E3C"/>
  <text x="479" y="126" fill="#FFF8F0" font-size="11px" font-weight="bold" letter-spacing="1" text-anchor="middle">🌐 WEBSITE</text>
</a>

<!-- Divider -->
<line x1="20" y1="148" x2="810" y2="148" class="divider"/>

<!-- Stats title -->
<text x="35" y="170" class="subtitle">🍂 GitHub Stats</text>

<!-- Repos + Stars -->
<text x="35" y="194">
  <tspan class="key">Repos</tspan>:<tspan class="cc" id="repo_data_dots"> .... </tspan><tspan class="value" id="repo_data">20</tspan>
  <tspan class="key" dx="20">Stars</tspan>:<tspan class="cc" id="star_data_dots"> ............. </tspan><tspan class="value" id="star_data">6</tspan>
</text>

<!-- Commits -->
<text x="35" y="216">
  <tspan class="key">Commits</tspan>:<tspan class="cc" id="commit_data_dots"> ................... </tspan><tspan class="value" id="commit_data">346</tspan>
</text>

<!-- LOC label -->
<text x="35" y="246" class="key">Lines of Code on GitHub</text>

<!-- LOC values -->
<text x="35" y="266">
  <tspan class="cc" id="loc_data_dots"> .. </tspan><tspan class="value" id="loc_data">677,009</tspan>
  <tspan> ( </tspan><tspan class="addColor" id="loc_add">1,168,962</tspan><tspan class="addColor">++</tspan><tspan>, </tspan><tspan class="delColor" id="loc_del">491,953</tspan><tspan class="delColor">--</tspan><tspan> )</tspan>
</text>

<!-- Divider -->
<line x1="20" y1="280" x2="810" y2="280" class="divider"/>

<!-- AI Usage title -->
<text x="35" y="302" class="subtitle">🤖 AI Usage</text>

<!-- Claude token count -->
<text x="35" y="326">
  <tspan class="key">Tokens Used</tspan>:<tspan class="cc" id="claude_tokens_dots"> ......... </tspan><tspan class="value" id="claude_tokens">86.8M</tspan>
</text>

</svg>
