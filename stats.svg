<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace" width="600px" height="165px" font-size="15px">
<style>
  .bg {fill: #FFF8F0;}
  .title {fill: #8B5E3C; font-weight: bold; font-size: 17px;}
  .key {fill: #A67C52;}
  .value {fill: #5C4433; font-weight: bold;}
  .cc {fill: #C9B29B;}
  .addColor {fill: #6B8E5A;}
  .delColor {fill: #C1666B;}
  text, tspan {white-space: pre;}
</style>
<rect width="600px" height="165px" fill="#FFF8F0" rx="12" stroke="#E8D9C5" stroke-width="1"/>
<text x="25" y="35" class="title">🍂 GitHub Stats</text>
<text x="25" y="70">
  <tspan class="key">Repos</tspan>:<tspan class="cc" id="repo_data_dots"> .... </tspan><tspan class="value" id="repo_data">0</tspan>
  <tspan class="key" dx="20">Stars</tspan>:<tspan class="cc" id="star_data_dots"> .... </tspan><tspan class="value" id="star_data">0</tspan>
</text>
<text x="25" y="95">
  <tspan class="key">Commits</tspan>:<tspan class="cc" id="commit_data_dots"> .... </tspan><tspan class="value" id="commit_data">0</tspan>
</text>
<text x="25" y="130" class="key">Lines of Code on GitHub</text>
<text x="25" y="150">
  <tspan class="cc" id="loc_data_dots">. </tspan><tspan class="value" id="loc_data">0</tspan>
  <tspan> ( </tspan><tspan class="addColor" id="loc_add">0</tspan><tspan class="addColor">++</tspan><tspan>, </tspan><tspan class="delColor" id="loc_del">0</tspan><tspan class="delColor">--</tspan><tspan> )</tspan>
</text>
</svg>
