name: README stats build

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0" # every Sunday at midnight UTC
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r cache/requirements.txt

      - name: Update stats.svg
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python scripts/generate_stats.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add stats.svg cache/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats.svg" && git push)
