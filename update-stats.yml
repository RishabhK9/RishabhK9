name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * 0" # every Sunday at midnight UTC
  workflow_dispatch: # lets you trigger it manually from the Actions tab

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats SVGs
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=RishabhK9&show_icons=true&include_all_commits=true&hide_border=true&bg_color=FFF8F0&title_color=8B5E3C&icon_color=D08770&text_color=5C4433" -o github-stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=RishabhK9&layout=compact&hide_border=true&bg_color=FFF8F0&title_color=8B5E3C&text_color=5C4433&langs_count=8" -o top-langs.svg

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-stats.svg top-langs.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update stats SVGs" && git push)
